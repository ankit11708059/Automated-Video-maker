name: Finance Shorts — Hourly

on:
  schedule:
    - cron: "0 * * * *"   # every hour, on the hour (UTC)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit finance_log.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Decode YouTube token
        run: |
          echo "$YOUTUBE_TOKEN" | base64 -d > youtube_token.pickle
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}

      - name: Run finance pipeline
        env:
          ELEVENLABS_API_KEY:      ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY:          ${{ secrets.PEXELS_API_KEY }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_TOKEN:  ${{ secrets.YOUTUBE_TOKEN }}
        run: python auto_finance.py

      - name: Commit upload log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add finance_log.json
          git diff --staged --quiet || git commit -m "log: finance upload [skip ci]"
          git push
