name: Lost History — English (Every Hour)

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour, UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get install -y ffmpeg fonts-liberation fonts-noto fonts-dejavu-core

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Decode History YouTube token
        run: echo "$HISTORY_YT_TOKEN" | base64 -d > history_token.pickle
        env:
          HISTORY_YT_TOKEN: ${{ secrets.HISTORY_YT_TOKEN }}

      - name: Run history pipeline
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          STABILITY_API_KEY:  ${{ secrets.STABILITY_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          HISTORY_YT_TOKEN:   ${{ secrets.HISTORY_YT_TOKEN }}
          IG_ACCESS_TOKEN:    ${{ secrets.IG_HISTORY_ACCESS_TOKEN }}
          IG_USER_ID:         ${{ secrets.IG_HISTORY_USER_ID }}
        run: python auto_history.py

      - name: Commit upload log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history_log.json
          git diff --staged --quiet || git commit -m "log: history upload [skip ci]"
          git push
